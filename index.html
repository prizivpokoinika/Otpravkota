<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Отправь кота</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #f7f3eb;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      width: 100%;
    }

    .header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2.5rem;
      background: white;
      padding: 1.2rem 2rem;
      border-radius: 60px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }

    .logo h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #1e1e2a;
    }

    .logo span {
      background: #f9d56e;
      padding: 0.1rem 0.6rem;
      border-radius: 40px;
      font-size: 1.5rem;
      margin-left: 6px;
    }

    .header-actions {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .btn {
      background: white;
      border: 2px solid #1e1e2a;
      padding: 0.7rem 1.8rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1rem;
      color: #1e1e2a;
      text-decoration: none;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .btn-primary {
      background: #1e1e2a;
      color: white;
      border: 2px solid #1e1e2a;
    }

    .btn-primary:hover {
      background: #3b3b4f;
      transform: scale(1.02);
    }

    .btn-primary::before {
      content: "📤 ";
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.8rem;
      margin-bottom: 2.5rem;
    }

    .cat-card {
      background: white;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.05);
      transition: 0.25s ease;
      cursor: default;
      border: 2px solid transparent;
    }

    .cat-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 18px 36px rgba(0,0,0,0.08);
      border-color: #f9d56e;
    }

    .cat-card img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
      background: #e6dfd6;
    }

    .cat-name {
      padding: 0.8rem 1.2rem 1.2rem;
      font-weight: 600;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #1e1e2a;
      letter-spacing: -0.3px;
    }

    .cat-name::before {
      content: "🐾";
      font-size: 1rem;
      opacity: 0.7;
    }

    .send-area {
      text-align: center;
      margin: 2.5rem 0 1.5rem;
    }

    .send-area .btn {
      font-size: 1.3rem;
      padding: 1rem 3rem;
      background: #1e1e2a;
      color: white;
      border: none;
      border-radius: 60px;
      box-shadow: 0 8px 24px rgba(30,30,42,0.2);
      transition: 0.2s;
    }

    .send-area .btn:hover {
      background: #3b3b4f;
      transform: scale(1.02);
      box-shadow: 0 12px 32px rgba(30,30,42,0.3);
    }

    .footer {
      margin-top: 2rem;
      text-align: center;
      color: #8a8a9a;
      font-size: 0.9rem;
    }

    @media (max-width: 600px) {
      .header {
        flex-direction: column;
        align-items: stretch;
        text-align: center;
        border-radius: 32px;
        padding: 1.2rem;
      }
      .header-actions {
        justify-content: center;
        flex-wrap: wrap;
      }
      .send-area .btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
<div class="container">

  <header class="header">
    <div class="logo">
      <h1>🐈 Отправь кота <span>+</span></h1>
    </div>
    <div class="header-actions">
      <a href="https://t.me/otpravkotabot" target="_blank" class="btn btn-primary">В бота @otpravkotabot</a>
    </div>
  </header>

  <!-- ГАЛЕРЕЯ -->
  <div class="gallery-grid" id="galleryGrid"></div>

  <!-- КНОПКА ОТПРАВКИ В БОТА -->
  <div class="send-area">
    <a href="https://t.me/otpravkotabot" target="_blank" class="btn">Отправить кота в бота</a>
    <p style="margin-top: 0.7rem; color: #6a6a7a; font-size: 0.9rem;">нажми — перейдёшь в @otpravkotabot</p>
  </div>

  <div class="footer">
    🐱 добавляй своего кота прямо сейчас
  </div>
</div>

<script>
  // ============================================================
  //  ДОБАВЛЯЙ КОТОВ ОДНОЙ СТРОЧКОЙ В МАССИВЕ НИЖЕ:
  //  { name: 'Имя кота', img: 'https://ссылка.на/фото.jpg' }
  // ============================================================
  const cats = [
       { name: 'siGMA aura kit', img: 'https://avatars.mds.yandex.net/i?id=cdcf50461c89c6038a73f7f83e46cbdc_l-11374185-images-thumbs&n=33&w=664&h=720' },
    // 👇 ДОБАВЛЯЙ НОВЫХ КОТОВ СЮДА (ОДНОЙ СТРОЧКОЙ)
    // { name: 'Барсик', img: 'https://example.com/barsik.jpg' },
  ];
  // ============================================================

  const galleryGrid = document.getElementById('galleryGrid');

  function renderGallery() {
    galleryGrid.innerHTML = '';
    cats.forEach(cat => {
      const card = document.createElement('div');
      card.className = 'cat-card';
      card.innerHTML = `
        <img src="${cat.img}" alt="${cat.name}" loading="lazy" onerror="this.src='https://placekitten.com/400/300?image=1'">
        <div class="cat-name">${cat.name}</div>
      `;
      galleryGrid.appendChild(card);
    });
  }

  renderGallery();
</script>
</body>
</html>
